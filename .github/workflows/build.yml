name: Build Jarvis APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download and install Gradle 8.5
        run: |
          curl -s -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper (creates gradle-wrapper.jar)
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
